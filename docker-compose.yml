services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: distromax
      POSTGRES_USER: distromax
      POSTGRES_PASSWORD: distromax
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U distromax -d distromax"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DJANGO_DEBUG: "${DJANGO_DEBUG:-1}"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-change-me-in-production}"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend,testserver,distromaxi.com,www.distromaxi.com,distromaxi.com.ar,www.distromaxi.com.ar}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,https://distromaxi.com,https://www.distromaxi.com,https://distromaxi.com.ar,https://www.distromaxi.com.ar}"
      POSTGRES_HOST: "${POSTGRES_HOST:-db}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      POSTGRES_DB: "${POSTGRES_DB:-distromax}"
      POSTGRES_USER: "${POSTGRES_USER:-distromax}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-distromax}"
      WEBPUSH_VAPID_PUBLIC_KEY: "${WEBPUSH_VAPID_PUBLIC_KEY:-}"
      WEBPUSH_VAPID_PRIVATE_KEY: "${WEBPUSH_VAPID_PRIVATE_KEY:-}"
      WEBPUSH_VAPID_EMAIL: "${WEBPUSH_VAPID_EMAIL:-mailto:admin@distromax.local}"
      MERCADO_PAGO_ACCESS_TOKEN: "${MERCADO_PAGO_ACCESS_TOKEN:-}"
      MERCADO_PAGO_WEBHOOK_SECRET: "${MERCADO_PAGO_WEBHOOK_SECRET:-}"
      ORS_API_KEY: "${ORS_API_KEY:-}"
      ORS_BASE_URL: "${ORS_BASE_URL:-https://api.openrouteservice.org}"
      OPENROUTESERVICE_API_KEY: "${OPENROUTESERVICE_API_KEY:-}"
      ROUTING_PROVIDER: "${ROUTING_PROVIDER:-ors}"
      ROUTING_SERVICE_MINUTES_PER_STOP: "${ROUTING_SERVICE_MINUTES_PER_STOP:-10}"
      WAREHOUSE_ORIGINS: "${WAREHOUSE_ORIGINS:-}"
      DJANGO_SEED_DEMO: "${DJANGO_SEED_DEMO:-0}"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=secureapprove_proxy"
      - "traefik.http.routers.distromaxi-api.entrypoints=websecure"
      - "traefik.http.routers.distromaxi-api.rule=(Host(`distromaxi.com`) || Host(`www.distromaxi.com`) || Host(`distromaxi.com.ar`) || Host(`www.distromaxi.com.ar`)) && PathPrefix(`/api`)"
      - "traefik.http.routers.distromaxi-api.priority=100"
      - "traefik.http.routers.distromaxi-api.tls=true"
      - "traefik.http.routers.distromaxi-api.middlewares=default-sec-headers@file,gzip-compress@file,cors-headers@file"
      - "traefik.http.services.distromaxi-api.loadbalancer.server.port=8000"
    networks:
      - default
      - secureapprove_proxy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: "${VITE_API_URL:-/api}"
    depends_on:
      - backend
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=secureapprove_proxy"
      - "traefik.http.routers.distromaxi-web.entrypoints=websecure"
      - "traefik.http.routers.distromaxi-web.rule=Host(`distromaxi.com`) || Host(`www.distromaxi.com`) || Host(`distromaxi.com.ar`) || Host(`www.distromaxi.com.ar`)"
      - "traefik.http.routers.distromaxi-web.tls=true"
      - "traefik.http.routers.distromaxi-web.middlewares=default-sec-headers@file,gzip-compress@file"
      - "traefik.http.services.distromaxi-web.loadbalancer.server.port=80"
    networks:
      - default
      - secureapprove_proxy

volumes:
  postgres_data:

networks:
  secureapprove_proxy:
    external: true
