services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: distromax
      POSTGRES_USER: distromax
      POSTGRES_PASSWORD: distromax
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U distromax -d distromax"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DJANGO_DEBUG: "${DJANGO_DEBUG:-1}"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-change-me-in-production}"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend,testserver}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}"
      POSTGRES_HOST: "${POSTGRES_HOST:-db}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      POSTGRES_DB: "${POSTGRES_DB:-distromax}"
      POSTGRES_USER: "${POSTGRES_USER:-distromax}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-distromax}"
      WEBPUSH_VAPID_PUBLIC_KEY: "${WEBPUSH_VAPID_PUBLIC_KEY:-}"
      WEBPUSH_VAPID_PRIVATE_KEY: "${WEBPUSH_VAPID_PRIVATE_KEY:-}"
      WEBPUSH_VAPID_EMAIL: "${WEBPUSH_VAPID_EMAIL:-mailto:admin@distromax.local}"
      MERCADO_PAGO_ACCESS_TOKEN: "${MERCADO_PAGO_ACCESS_TOKEN:-}"
      MERCADO_PAGO_WEBHOOK_SECRET: "${MERCADO_PAGO_WEBHOOK_SECRET:-}"
      OPENROUTESERVICE_API_KEY: "${OPENROUTESERVICE_API_KEY:-}"
      ROUTING_PROVIDER: "${ROUTING_PROVIDER:-ors}"
      ROUTING_SERVICE_MINUTES_PER_STOP: "${ROUTING_SERVICE_MINUTES_PER_STOP:-10}"
      DJANGO_SEED_DEMO: "${DJANGO_SEED_DEMO:-1}"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: "${VITE_API_URL:-/api}"
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
